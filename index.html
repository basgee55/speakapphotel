<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#05050a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lumière">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Hotel Lumière AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c9a84c;
      --gold-bright: #f0cc6e;
      --gold-dim: #6a5218;
      --void: #05050a;
      --surface: #0d0d16;
      --surface2: #14141f;
      --glass: rgba(201,168,76,0.05);
      --border: rgba(201,168,76,0.15);
      --text: #ede8dc;
      --muted: rgba(237,232,220,0.4);
      --status: #4ade80;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%; height: 100dvh;
      overflow: hidden;
      background: var(--void);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
    }

    /* AMBIENT BORDER */
    #ambient-border {
      position: fixed; inset: 0; z-index: 100;
      pointer-events: none;
      border-radius: 0;
      transition: box-shadow 0.8s ease;
      box-shadow: inset 0 0 0px 0px transparent;
    }
    #ambient-border.listening { box-shadow: inset 0 0 30px 4px rgba(201,168,76,0.25); }
    #ambient-border.thinking  { box-shadow: inset 0 0 30px 4px rgba(120,100,255,0.25); }
    #ambient-border.speaking  { box-shadow: inset 0 0 30px 4px rgba(74,222,128,0.2); }
    #ambient-border.error     { box-shadow: inset 0 0 30px 4px rgba(239,68,68,0.3); }

    /* BACKGROUND */
    #bg {
      position: fixed; inset: 0; z-index: 0; overflow: hidden;
    }
    #bg::before {
      content: ''; position: absolute;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.07) 0%, transparent 70%);
      top: -180px; right: -120px;
      animation: orb1 14s ease-in-out infinite alternate;
    }
    #bg::after {
      content: ''; position: absolute;
      width: 350px; height: 350px; border-radius: 50%;
      background: radial-gradient(circle, rgba(90,60,200,0.06) 0%, transparent 70%);
      bottom: -80px; left: -80px;
      animation: orb2 18s ease-in-out infinite alternate;
    }
    @keyframes orb1 { from { transform: translate(0,0) scale(1); } to { transform: translate(-20px,30px) scale(1.12); } }
    @keyframes orb2 { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,-20px) scale(1.1); } }

    /* SCANLINES */
    .scan {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px);
    }

    /* APP LAYOUT */
    #app {
      position: relative; z-index: 2;
      height: 100%; height: 100dvh;
      display: flex; flex-direction: column;
      max-width: 480px; margin: 0 auto;
    }

    /* HEADER */
    #header {
      flex-shrink: 0;
      padding: max(env(safe-area-inset-top), 14px) 20px 0;
    }
    .header-inner {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 12px;
      border-bottom: 0.5px solid var(--border);
    }
    .logo { display: flex; flex-direction: column; gap: 2px; }
    .logo-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 21px; font-weight: 300; letter-spacing: 0.28em;
      color: var(--gold-bright);
      text-shadow: 0 0 24px rgba(240,204,110,0.45);
      line-height: 1;
    }
    .logo-tagline {
      font-size: 9px; letter-spacing: 0.38em;
      color: var(--gold-dim); text-transform: uppercase; font-weight: 500;
    }
    .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .status-pill {
      display: flex; align-items: center; gap: 5px;
      font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted);
    }
    .status-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--status);
      box-shadow: 0 0 6px rgba(74,222,128,0.7);
      animation: pulse-dot 2.5s ease-in-out infinite;
      transition: background 0.4s, box-shadow 0.4s;
    }
    .status-dot.gold { background: var(--gold); box-shadow: 0 0 6px rgba(201,168,76,0.7); }
    .status-dot.purple { background: #a78bfa; box-shadow: 0 0 6px rgba(167,139,250,0.7); }
    .status-dot.red { background: #f87171; box-shadow: 0 0 6px rgba(248,113,113,0.7); }
    @keyframes pulse-dot {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.4; transform:scale(0.65); }
    }
    #status-text { font-size: 9px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }

    /* VESTIGING TABS */
    #tabs {
      flex-shrink: 0;
      padding: 10px 20px 8px;
    }
    .tab-row {
      display: flex; gap: 7px;
      overflow-x: auto; scrollbar-width: none;
    }
    .tab-row::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      padding: 5px 13px; border-radius: 20px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; white-space: nowrap;
      cursor: pointer; border: 0.5px solid rgba(201,168,76,0.15);
      background: transparent; color: var(--muted);
      transition: all 0.2s;
    }
    .tab.active {
      background: rgba(201,168,76,0.1);
      border-color: var(--gold);
      color: var(--gold-bright);
      box-shadow: 0 0 14px rgba(201,168,76,0.15);
    }

    /* MESSAGES */
    #messages {
      flex: 1; overflow-y: auto;
      padding: 10px 18px 8px;
      display: flex; flex-direction: column; gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: rgba(201,168,76,0.08) transparent;
    }
    #messages::-webkit-scrollbar { width: 2px; }
    #messages::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.12); border-radius: 1px; }

    /* WELCOME */
    #welcome {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; gap: 14px; text-align: center;
      padding: 20px;
    }
    .welcome-ring {
      width: 72px; height: 72px; border-radius: 50%;
      border: 0.5px solid rgba(201,168,76,0.3);
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle, rgba(201,168,76,0.08), transparent);
      box-shadow: 0 0 40px rgba(201,168,76,0.12), 0 0 80px rgba(201,168,76,0.05);
      animation: float 4s ease-in-out infinite;
      font-size: 28px;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    .welcome-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px; font-weight: 300;
      color: var(--gold-bright); letter-spacing: 0.08em;
    }
    .welcome-sub { font-size: 13px; color: var(--muted); line-height: 1.65; max-width: 260px; }
    .quick-list { display: flex; flex-direction: column; gap: 7px; width: 100%; max-width: 290px; margin-top: 6px; }
    .quick-btn {
      padding: 10px 14px;
      border: 0.5px solid var(--border);
      border-radius: 10px; background: var(--glass);
      color: var(--text); font-family: 'Rajdhani', sans-serif;
      font-size: 13px; font-weight: 500;
      cursor: pointer; text-align: left;
      display: flex; align-items: center; gap: 10px;
      transition: all 0.2s; letter-spacing: 0.02em;
    }
    .quick-btn:active { border-color: var(--gold); background: rgba(201,168,76,0.1); color: var(--gold-bright); }

    /* MESSAGES */
    .msg { display: flex; flex-direction: column; gap: 3px; animation: fadeUp 0.22s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }
    .msg.user { align-items: flex-end; }
    .msg.ai { align-items: flex-start; }
    .msg-label { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); padding: 0 3px; }
    .msg.user .msg-label { color: rgba(201,168,76,0.35); }
    .bubble {
      max-width: 88%;
      padding: 9px 13px;
      font-size: 14px; line-height: 1.65; font-weight: 400;
    }
    .msg.user .bubble {
      background: linear-gradient(135deg, rgba(201,168,76,0.13), rgba(201,168,76,0.06));
      border: 0.5px solid rgba(201,168,76,0.28);
      border-radius: 14px 14px 3px 14px;
    }
    .msg.ai .bubble {
      background: rgba(255,255,255,0.03);
      border: 0.5px solid rgba(255,255,255,0.07);
      border-radius: 3px 14px 14px 14px;
      color: rgba(237,232,220,0.9);
    }
    .msg.ai .bubble.streaming { border-color: rgba(201,168,76,0.15); }

    /* ACTION BLOCKS */
    .action-blocks {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: 6px; max-width: 88%;
      animation: fadeUp 0.3s ease 0.1s both;
    }
    .action-block {
      display: flex; flex-direction: column; gap: 2px;
      padding: 7px 11px;
      border: 0.5px solid var(--border);
      border-radius: 8px;
      background: var(--glass);
      font-size: 11px;
      min-width: 80px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative; overflow: hidden;
    }
    .action-block::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--block-color, var(--gold)), transparent);
      opacity: 0.6;
    }
    .action-block:active { background: rgba(201,168,76,0.1); border-color: var(--gold); }
    .block-type {
      font-size: 8px; letter-spacing: 0.15em;
      text-transform: uppercase; font-weight: 600;
      color: var(--block-color, var(--gold));
    }
    .block-value { font-size: 12px; font-weight: 500; color: var(--text); letter-spacing: 0.02em; }

    /* TYPING */
    .typing { display: flex; gap: 5px; padding: 12px 14px; align-items: center; }
    .typing span {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--gold); opacity: 0.35;
      animation: tdot 1.2s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tdot { 0%,60%,100%{opacity:0.35;transform:scale(1)} 30%{opacity:1;transform:scale(1.4)} }

    /* WAVE VISUALIZER */
    #wave-area {
      flex-shrink: 0;
      padding: 8px 20px 4px;
      display: flex; align-items: center; justify-content: center;
      height: 52px;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #wave-area.active { opacity: 1; }
    #wave-canvas {
      width: 100%; height: 40px;
      border-radius: 20px;
    }

    /* INPUT AREA */
    #input-area {
      flex-shrink: 0;
      padding: 8px 16px;
      padding-bottom: max(env(safe-area-inset-bottom), 14px);
      border-top: 0.5px solid var(--border);
      background: rgba(5,5,10,0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .input-row {
      display: flex; align-items: center; gap: 10px;
    }

    /* TRANSCRIPT AREA (shown when listening) */
    #transcript-box {
      flex: 1;
      min-height: 42px;
      background: rgba(255,255,255,0.03);
      border: 0.5px solid rgba(201,168,76,0.2);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px; line-height: 1.5;
      color: var(--text);
      display: none;
      align-items: center;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 400;
      letter-spacing: 0.01em;
      word-break: break-word;
    }
    #transcript-box.active { display: flex; }
    #transcript-placeholder {
      color: var(--muted); font-style: italic; font-size: 13px;
    }
    #transcript-text { color: var(--text); }

    /* TYPE INPUT (shown when not listening) */
    #type-row {
      flex: 1;
      display: flex; align-items: flex-end; gap: 8px;
      background: rgba(255,255,255,0.03);
      border: 0.5px solid rgba(201,168,76,0.18);
      border-radius: 12px;
      padding: 9px 10px 9px 14px;
      transition: border-color 0.2s;
    }
    #type-row:focus-within { border-color: rgba(201,168,76,0.4); }
    #text-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-family: 'Rajdhani', sans-serif;
      font-size: 14px; font-weight: 400; line-height: 1.5;
      resize: none; max-height: 100px; min-height: 20px;
    }
    #text-input::placeholder { color: var(--muted); }
    #send-btn {
      width: 30px; height: 30px; border-radius: 7px;
      border: none; background: rgba(201,168,76,0.15);
      color: var(--gold-bright); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
      transition: all 0.15s;
    }
    #send-btn:active { transform: scale(0.92); background: rgba(201,168,76,0.3); }
    #send-btn:disabled { opacity: 0.3; }

    /* MIC BUTTON */
    #mic-btn {
      width: 48px; height: 48px; border-radius: 50%;
      border: 0.5px solid var(--border);
      background: var(--glass);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: all 0.25s;
      position: relative;
    }
    #mic-btn.listening {
      background: rgba(201,168,76,0.15);
      border-color: var(--gold);
      box-shadow: 0 0 0 8px rgba(201,168,76,0.08), 0 0 20px rgba(201,168,76,0.2);
      animation: mic-pulse 1.5s ease-in-out infinite;
    }
    #mic-btn.disabled { opacity: 0.35; cursor: default; }
    @keyframes mic-pulse {
      0%,100% { box-shadow: 0 0 0 8px rgba(201,168,76,0.08), 0 0 20px rgba(201,168,76,0.2); }
      50% { box-shadow: 0 0 0 14px rgba(201,168,76,0.04), 0 0 30px rgba(201,168,76,0.3); }
    }
    #mic-btn svg { width: 20px; height: 20px; transition: all 0.2s; }
    #mic-btn.listening svg { filter: drop-shadow(0 0 4px rgba(201,168,76,0.8)); }

    /* INPUT TOGGLE */
    #input-toggle {
      display: flex; gap: 6px; margin-bottom: 8px; justify-content: center;
    }
    .toggle-btn {
      padding: 4px 12px; border-radius: 12px;
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      font-weight: 600; border: 0.5px solid var(--border);
      background: transparent; color: var(--muted);
      cursor: pointer; transition: all 0.2s;
    }
    .toggle-btn.active {
      background: rgba(201,168,76,0.1); border-color: var(--gold); color: var(--gold-bright);
    }

    /* NOT SUPPORTED */
    #no-speech {
      display: none;
      text-align: center; font-size: 12px; color: var(--muted);
      padding: 6px; line-height: 1.5;
    }
  </style>
</head>
<body>
<div id="ambient-border"></div>
<div id="bg"></div>
<div class="scan"></div>

<div id="app">
  <!-- HEADER -->
  <div id="header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-name">LUMIÈRE</div>
        <div class="logo-tagline">Hotel Intelligence</div>
      </div>
      <div class="header-right">
        <div class="status-pill">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">Gereed</span>
        </div>
      </div>
    </div>
  </div>

  <!-- VESTIGING TABS -->
  <div id="tabs">
    <div class="tab-row" id="tab-row"></div>
  </div>

  <!-- MESSAGES -->
  <div id="messages">
    <div id="welcome">
      <div class="welcome-ring">🏨</div>
      <div class="welcome-title">Goedemiddag</div>
      <div class="welcome-sub">Uw persoonlijke hotel-assistent. Spreek of typ uw vraag.</div>
      <div class="quick-list">
        <button class="quick-btn" onclick="sendQuick('Wat zijn de bezettingsgraden van alle vestigingen vandaag?')">
          <span>📊</span> Bezettingsgraad vandaag
        </button>
        <button class="quick-btn" onclick="sendQuick('Zijn er nieuwe reserveringen binnengekomen?')">
          <span>📅</span> Nieuwe reserveringen
        </button>
        <button class="quick-btn" onclick="sendQuick('Wat staat er vanavond op de menukaart van het restaurant?')">
          <span>🍽️</span> Menukaart vanavond
        </button>
        <button class="quick-btn" onclick="sendQuick('Geef een overzicht van alle openstaande klachten.')">
          <span>⚠️</span> Openstaande klachten
        </button>
      </div>
    </div>
  </div>

  <!-- WAVE VISUALIZER -->
  <div id="wave-area">
    <canvas id="wave-canvas"></canvas>
  </div>

  <!-- INPUT AREA -->
  <div id="input-area">
    <div id="input-toggle">
      <button class="toggle-btn active" id="toggle-voice" onclick="switchMode('voice')">🎙 Stem</button>
      <button class="toggle-btn" id="toggle-type" onclick="switchMode('type')">⌨️ Typen</button>
    </div>

    <div class="input-row" id="voice-row">
      <div id="transcript-box">
        <span id="transcript-placeholder">Tik op de microfoon en spreek...</span>
        <span id="transcript-text" style="display:none"></span>
      </div>
      <button id="mic-btn" onclick="toggleMic()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--gold-bright)">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
    </div>

    <div class="input-row" id="type-row-wrapper" style="display:none">
      <div id="type-row">
        <textarea id="text-input" placeholder="Typ uw vraag..." rows="1"></textarea>
        <button id="send-btn" onclick="sendTyped()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="no-speech">Spraakherkenning niet beschikbaar in deze browser. Gebruik Chrome of Safari.</div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────
const VESTIGINGEN = ['Alle', 'Amsterdam', 'Rotterdam', 'Utrecht', 'Den Haag'];
let activeVestiging = 'Alle';
let history = [];
let isProcessing = false;
let isListening = false;
let recognition = null;
let audioCtx = null;
let analyser = null;
let animFrame = null;
let inputMode = 'voice';
let currentTranscript = '';

const SYSTEM_PROMPT = `Je bent de AI-assistent van Hotel Lumière, een luxe hotelketen met vestigingen in Amsterdam, Rotterdam, Utrecht en Den Haag. Je helpt de hoteleigenaar met alle aspecten van het hotelbeheer.

Je hebt kennis van:
- Kamerbezetting en reserveringen per vestiging
- Restaurant boekingen en menukaarten
- Personeelsbezetting
- Klachtenafhandeling
- Inkomsten en financiële overzichten

Je doet alsof je toegang hebt tot echte data. Verzin realistische, specifieke data als je ernaar gevraagd wordt. Gebruik altijd echte getallen, namen, kamernummers etc. om het realistisch te maken.

Na elk antwoord voeg je een JSON blok toe met gedetecteerde entiteiten. Formaat (altijd aan het einde, niets erna):
[BLOCKS]{"items":[{"type":"Kamer","value":"..."},{"type":"Gast","value":"..."},{"type":"Datum","value":"..."},{"type":"Bedrag","value":"..."},{"type":"Vestiging","value":"..."},{"type":"Status","value":"..."}]}[/BLOCKS]

Voeg alleen relevante items toe (max 5). Laat het blok weg als er geen relevante entiteiten zijn.

Spreek de eigenaar aan als "u". Wees professioneel maar direct. Antwoord altijd in het Nederlands.`;

// ── INIT ──────────────────────────────────────────────────────────────
function init() {
  buildTabs();
  setupSpeechRecognition();
  setupTextInput();
}

function buildTabs() {
  const row = document.getElementById('tab-row');
  VESTIGINGEN.forEach(v => {
    const t = document.createElement('button');
    t.className = 'tab' + (v === activeVestiging ? ' active' : '');
    t.textContent = v;
    t.onclick = () => {
      activeVestiging = v;
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
    };
    row.appendChild(t);
  });
}

// ── SPEECH RECOGNITION ─────────────────────────────────────────────────
function setupSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('no-speech').style.display = 'block';
    document.getElementById('mic-btn').classList.add('disabled');
    return;
  }
  recognition = new SR();
  recognition.lang = 'nl-NL';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isListening = true;
    setStatus('listening', 'Luistert...', 'gold');
    document.getElementById('mic-btn').classList.add('listening');
    document.getElementById('ambient-border').className = 'listening';
    document.getElementById('transcript-box').classList.add('active');
    document.getElementById('transcript-placeholder').style.display = 'none';
    document.getElementById('transcript-text').style.display = 'inline';
    document.getElementById('transcript-text').textContent = '';
    document.getElementById('wave-area').classList.add('active');
    startWave();
  };

  recognition.onresult = (e) => {
    let interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t;
      else interim += t;
    }
    currentTranscript = final || interim;
    document.getElementById('transcript-text').textContent = currentTranscript;
  };

  recognition.onend = () => {
    stopListeningUI();
    if (currentTranscript.trim()) {
      sendMessage(currentTranscript.trim());
      currentTranscript = '';
    }
  };

  recognition.onerror = (e) => {
    stopListeningUI();
    if (e.error !== 'no-speech' && e.error !== 'aborted') {
      setStatus('error', 'Fout: ' + e.error, 'red');
      document.getElementById('ambient-border').className = 'error';
      setTimeout(() => {
        setStatus('idle', 'Gereed', '');
        document.getElementById('ambient-border').className = '';
      }, 2000);
    }
  };
}

function toggleMic() {
  if (isProcessing) return;
  if (!recognition) return;
  if (isListening) {
    recognition.stop();
  } else {
    currentTranscript = '';
    try { recognition.start(); } catch(e) {}
  }
}

function stopListeningUI() {
  isListening = false;
  document.getElementById('mic-btn').classList.remove('listening');
  document.getElementById('wave-area').classList.remove('active');
  stopWave();
  if (!isProcessing) {
    setStatus('idle', 'Gereed', '');
    document.getElementById('ambient-border').className = '';
  }
  document.getElementById('transcript-box').classList.remove('active');
  document.getElementById('transcript-placeholder').style.display = 'inline';
  document.getElementById('transcript-text').style.display = 'none';
}

// ── WAVE VISUALIZER ────────────────────────────────────────────────────
function startWave() {
  const canvas = document.getElementById('wave-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * window.devicePixelRatio;
  canvas.height = canvas.offsetHeight * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  let t = 0;

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.beginPath();
    for (let x = 0; x <= W; x++) {
      const freq1 = Math.sin((x / W) * Math.PI * 6 + t) * (H * 0.22);
      const freq2 = Math.sin((x / W) * Math.PI * 10 + t * 1.3) * (H * 0.1);
      const y = H / 2 + freq1 + freq2;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    const grad = ctx.createLinearGradient(0, 0, W, 0);
    grad.addColorStop(0, 'rgba(201,168,76,0)');
    grad.addColorStop(0.2, 'rgba(201,168,76,0.6)');
    grad.addColorStop(0.5, 'rgba(240,204,110,0.9)');
    grad.addColorStop(0.8, 'rgba(201,168,76,0.6)');
    grad.addColorStop(1, 'rgba(201,168,76,0)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    t += 0.06;
    animFrame = requestAnimationFrame(draw);
  }
  draw();
}

function stopWave() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  const canvas = document.getElementById('wave-canvas');
  const ctx = canvas.getContext('2d');
  if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// ── TEXT INPUT ─────────────────────────────────────────────────────────
function setupTextInput() {
  const ta = document.getElementById('text-input');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
  });
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendTyped();
    }
  });
}

function sendTyped() {
  const ta = document.getElementById('text-input');
  const text = ta.value.trim();
  if (!text || isProcessing) return;
  ta.value = '';
  ta.style.height = 'auto';
  sendMessage(text);
}

function switchMode(mode) {
  inputMode = mode;
  document.getElementById('toggle-voice').classList.toggle('active', mode === 'voice');
  document.getElementById('toggle-type').classList.toggle('active', mode === 'type');
  document.getElementById('voice-row').style.display = mode === 'voice' ? 'flex' : 'none';
  document.getElementById('type-row-wrapper').style.display = mode === 'type' ? 'flex' : 'none';
}

// ── SEND MESSAGE ───────────────────────────────────────────────────────
function sendQuick(text) {
  document.getElementById('welcome')?.remove();
  sendMessage(text);
}

async function sendMessage(text) {
  if (isProcessing) return;
  document.getElementById('welcome')?.remove();

  isProcessing = true;
  setStatus('thinking', 'Denkt na...', 'purple');
  document.getElementById('ambient-border').className = 'thinking';

  // Add vestiging context
  const contextText = activeVestiging !== 'Alle'
    ? `[Vestiging: ${activeVestiging}] ${text}`
    : text;

  history.push({ role: 'user', content: contextText });
  addMsg('user', text);

  const typingEl = addTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await res.json();
    typingEl.remove();

    const raw = data.content?.[0]?.text || 'Geen antwoord ontvangen.';
    const { clean, blocks } = parseResponse(raw);

    history.push({ role: 'assistant', content: raw });
    addMsg('ai', clean, blocks);

    setStatus('idle', 'Gereed', '');
    document.getElementById('ambient-border').className = 'speaking';
    setTimeout(() => { document.getElementById('ambient-border').className = ''; }, 1500);

  } catch (err) {
    typingEl.remove();
    addMsg('ai', 'Er is een verbindingsfout opgetreden. Probeer opnieuw.');
    setStatus('error', 'Fout', 'red');
    document.getElementById('ambient-border').className = 'error';
    setTimeout(() => {
      setStatus('idle', 'Gereed', '');
      document.getElementById('ambient-border').className = '';
    }, 2000);
    history.pop();
  }

  isProcessing = false;
}

// ── PARSE AI RESPONSE ──────────────────────────────────────────────────
function parseResponse(raw) {
  const blockMatch = raw.match(/\[BLOCKS\]([\s\S]*?)\[\/BLOCKS\]/);
  let blocks = [];
  let clean = raw.replace(/\[BLOCKS\][\s\S]*?\[\/BLOCKS\]/g, '').trim();

  if (blockMatch) {
    try {
      const parsed = JSON.parse(blockMatch[1]);
      blocks = (parsed.items || []).filter(b => b.value && b.value !== '...' && b.value.length > 0);
    } catch(e) {}
  }
  return { clean, blocks };
}

// ── BLOCK COLORS ───────────────────────────────────────────────────────
const BLOCK_COLORS = {
  'Kamer':    '#c9a84c',
  'Gast':     '#7dd3fc',
  'Datum':    '#86efac',
  'Bedrag':   '#fda4af',
  'Vestiging':'#c4b5fd',
  'Status':   '#fdba74',
};

// ── ADD MESSAGE ────────────────────────────────────────────────────────
function addMsg(role, text, blocks = []) {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'U' : 'Lumière AI';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  wrap.appendChild(label);
  wrap.appendChild(bubble);

  if (role === 'ai' && blocks.length > 0) {
    const blockRow = document.createElement('div');
    blockRow.className = 'action-blocks';
    blocks.forEach(b => {
      const el = document.createElement('div');
      el.className = 'action-block';
      const color = BLOCK_COLORS[b.type] || 'var(--gold)';
      el.style.setProperty('--block-color', color);

      const typeEl = document.createElement('div');
      typeEl.className = 'block-type';
      typeEl.textContent = b.type;

      const valEl = document.createElement('div');
      valEl.className = 'block-value';
      valEl.textContent = b.value;

      el.appendChild(typeEl);
      el.appendChild(valEl);
      blockRow.appendChild(el);
    });
    wrap.appendChild(blockRow);
  }

  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return wrap;
}

function addTyping() {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg ai';
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = 'Lumière AI';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return wrap;
}

// ── STATUS ─────────────────────────────────────────────────────────────
function setStatus(state, text, dotClass) {
  document.getElementById('status-text').textContent = text;
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot' + (dotClass ? ' ' + dotClass : '');
}

init();
