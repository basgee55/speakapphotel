<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b0f1e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lumière">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Hotel Lumière</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%; height: 100dvh;
      background: #0b0f1e;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    #app {
      height: 100%; height: 100dvh;
      display: flex; flex-direction: column; align-items: center;
      padding: max(env(safe-area-inset-top), 24px) 20px max(env(safe-area-inset-bottom), 16px);
      box-shadow: inset 0 0 80px 10px rgba(124,58,237,0.09), inset 0 0 0 1.5px rgba(124,58,237,0.2);
      overflow-y: auto;
    }

    /* HEADER */
    #header {
      width: 100%; max-width: 460px;
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 20px;
      position: relative;
      flex-shrink: 0;
    }
    .hotel-label {
      font-size: 11px; letter-spacing: 5px; font-weight: 500;
      color: rgba(124,58,237,0.6); margin-bottom: 5px;
    }
    .hotel-name {
      font-size: 26px; font-weight: 300; letter-spacing: 3px; color: #c4b5fd;
      text-shadow: 0 0 24px rgba(124,58,237,0.4);
    }
    .hotel-name .cy { color: #22d3ee; }
    #settings-btn {
      position: absolute; right: 0; top: 0;
      width: 32px; height: 32px; border-radius: 8px;
      border: 1px solid rgba(124,58,237,0.3); background: transparent;
      color: rgba(148,163,184,0.6); cursor: pointer; font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    #settings-btn:active { border-color: #7c3aed; color: #c4b5fd; }

    /* MIC / WAVE AREA */
    #mic-area {
      cursor: pointer; flex-shrink: 0;
      width: 260px; height: 160px;
      position: relative;
      margin-bottom: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    #wave-svg { display: block; }

    /* STATUS */
    #status-area {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px; flex-shrink: 0;
    }
    #status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #7c3aed; box-shadow: 0 0 8px #7c3aed;
      opacity: 0.7; transition: background 0.3s, box-shadow 0.3s;
    }
    #status-dot.listening { background: #22d3ee; box-shadow: 0 0 8px #22d3ee; opacity: 1; }
    #status-dot.thinking  { background: #a78bfa; box-shadow: 0 0 8px #a78bfa; opacity: 1; }
    #status-dot.speaking  { background: #34d399; box-shadow: 0 0 8px #34d399; opacity: 1; }
    #status-text { font-size: 11px; letter-spacing: 3px; color: #64748b; }

    /* MESSAGES */
    #messages {
      width: 100%; max-width: 460px;
      display: flex; flex-direction: column; gap: 10px;
      margin-bottom: 14px;
      flex: 1; min-height: 0;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(124,58,237,0.1) transparent;
    }
    #messages::-webkit-scrollbar { width: 2px; }
    #messages::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.15); border-radius: 1px; }

    #welcome {
      text-align: center; font-size: 17px; color: #94a3b8;
      line-height: 1.7; padding: 16px 16px 0;
    }
    #welcome .acc { color: #c4b5fd; }

    .msg-bubble {
      max-width: 80%; padding: 11px 15px;
      border-radius: 16px; font-size: 15px; line-height: 1.6;
      animation: fadeUp 0.2s ease;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .msg-bubble.user {
      align-self: flex-end;
      background: #1e1b4b; border: 1px solid rgba(124,58,237,0.33);
      color: #c4b5fd; box-shadow: 0 0 16px rgba(124,58,237,0.1);
    }
    .msg-bubble.ai {
      align-self: flex-start;
      background: #0c1a2e; border: 1px solid rgba(6,182,212,0.26);
      color: #7dd3fc; box-shadow: 0 0 16px rgba(6,182,212,0.1);
    }
    .typing-dots {
      align-self: flex-start; display: flex; gap: 6px; padding: 11px 18px;
    }
    .typing-dots div {
      width: 7px; height: 7px; border-radius: 50%;
      background: #06b6d4; box-shadow: 0 0 8px #06b6d4;
      animation: bounce 1.1s ease-in-out infinite;
    }
    .typing-dots div:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots div:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,80%,100% { transform: scale(0.6); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* QUICK BUTTONS */
    #quick-buttons {
      display: grid; grid-template-columns: 1fr 1fr; gap: 9px;
      width: 100%; max-width: 460px;
      margin-bottom: 10px; flex-shrink: 0;
    }
    .quick-btn {
      padding: 12px 14px; border-radius: 13px;
      font-size: 14px; cursor: pointer; text-align: left;
      font-family: inherit; background: transparent; transition: all 0.18s;
    }
    .quick-btn.purple {
      border: 1px solid rgba(124,58,237,0.4); color: #a78bfa;
      box-shadow: 0 0 12px rgba(124,58,237,0.07);
    }
    .quick-btn.purple:active { background: rgba(124,58,237,0.1); }
    .quick-btn.cyan {
      border: 1px solid rgba(6,182,212,0.27); color: #67e8f9;
      box-shadow: 0 0 12px rgba(6,182,212,0.07);
    }
    .quick-btn.cyan:active { background: rgba(6,182,212,0.08); }

    /* TEXT INPUT */
    #keyboard-toggle {
      font-size: 10px; letter-spacing: 2px; color: rgba(100,116,139,0.4);
      background: none; border: none; cursor: pointer;
      padding: 4px 8px; font-family: inherit;
      margin-bottom: 6px; flex-shrink: 0; transition: color 0.2s;
    }
    #keyboard-toggle:active { color: #64748b; }
    #type-area {
      width: 100%; max-width: 460px;
      display: none; gap: 8px; align-items: flex-end;
      flex-shrink: 0;
    }
    #type-area.visible { display: flex; }
    #text-input {
      flex: 1; background: rgba(255,255,255,0.03);
      border: 1px solid rgba(124,58,237,0.25); border-radius: 12px;
      padding: 11px 14px; color: #e2e8f0; font-family: inherit;
      font-size: 14px; outline: none; resize: none;
      max-height: 100px; min-height: 42px;
    }
    #text-input:focus { border-color: rgba(124,58,237,0.55); }
    #text-input::placeholder { color: #475569; }
    #send-btn {
      width: 42px; height: 42px; border-radius: 10px; flex-shrink: 0;
      background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.4);
      color: #c4b5fd; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    #send-btn:active { background: rgba(124,58,237,0.3); }

    /* SETTINGS MODAL */
    #settings-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(11,15,30,0.92);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    #settings-overlay.hidden { display: none; }
    #settings-card {
      width: 100%; max-width: 380px;
      background: #14141f; border: 1px solid rgba(124,58,237,0.25);
      border-radius: 18px; padding: 28px 24px;
      display: flex; flex-direction: column; gap: 18px;
      box-shadow: 0 0 60px rgba(124,58,237,0.08);
    }
    .settings-title { font-size: 20px; font-weight: 300; color: #c4b5fd; letter-spacing: 0.06em; }
    .settings-sub { font-size: 12px; color: #64748b; line-height: 1.6; }
    .settings-field { display: flex; flex-direction: column; gap: 7px; }
    .settings-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600; color: #a78bfa; }
    .settings-input-wrap {
      display: flex; align-items: center;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(124,58,237,0.2);
      border-radius: 10px; overflow: hidden; transition: border-color 0.2s;
    }
    .settings-input-wrap:focus-within { border-color: #7c3aed; }
    .settings-input-wrap input {
      flex: 1; background: transparent; border: none; outline: none;
      color: #e2e8f0; font-family: inherit; font-size: 14px;
      padding: 11px 14px; letter-spacing: 0.04em;
    }
    .settings-input-wrap input::placeholder { color: #475569; }
    .settings-input-wrap button {
      padding: 0 12px; background: transparent; border: none;
      color: #64748b; cursor: pointer; font-size: 15px; flex-shrink: 0;
    }
    #save-key-btn {
      width: 100%; padding: 12px; border-radius: 10px;
      background: rgba(124,58,237,0.2); border: 1px solid #7c3aed; color: #c4b5fd;
      font-family: inherit; font-size: 14px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.2s;
    }
    #save-key-btn:active { background: rgba(124,58,237,0.35); }
    #save-key-btn:disabled { opacity: 0.4; cursor: default; }
    .settings-hint { font-size: 11px; color: #475569; line-height: 1.55; text-align: center; }
  </style>
</head>
<body>

<div id="app">
  <div id="header">
    <div class="hotel-label">HOTEL</div>
    <div class="hotel-name">Lumi<span class="cy">è</span>re</div>
    <button id="settings-btn" onclick="openSettings()">⚙️</button>
  </div>

  <div id="mic-area" onclick="toggleMic()">
    <svg id="wave-svg" width="260" height="160">
      <defs>
        <radialGradient id="mglow" cx="50%" cy="50%" r="50%">
          <stop id="glow-stop" offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#0b0f1e" stop-opacity="0"/>
        </radialGradient>
        <filter id="bf" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="2.5"/>
        </filter>
      </defs>
      <ellipse cx="130" cy="80" rx="110" ry="65" fill="url(#mglow)"/>
      <g id="wl"></g>
      <g id="wr"></g>
      <circle id="ro" cx="130" cy="80" r="43" fill="none" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.3"/>
      <circle id="ri" cx="130" cy="80" r="52" fill="none" stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.2"/>
      <circle id="mc" cx="130" cy="80" r="38" fill="#100a2e" stroke="#7c3aed" stroke-width="1.5"/>
      <circle cx="130" cy="80" r="38" fill="none" stroke="#a78bfa" stroke-width="10" stroke-opacity="0.07"/>
      <rect id="mi0" x="123" y="63" width="14" height="20" rx="7" fill="none" stroke="#c4b5fd" stroke-width="2"/>
      <path id="mi1" d="M118 81 Q118 93 130 93 Q142 93 142 81" fill="none" stroke="#c4b5fd" stroke-width="1.8" stroke-linecap="round"/>
      <line id="mi2" x1="130" y1="93" x2="130" y2="99" stroke="#c4b5fd" stroke-width="1.8"/>
      <line id="mi3" x1="124" y1="99" x2="136" y2="99" stroke="#c4b5fd" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
  </div>

  <div id="status-area">
    <div id="status-dot"></div>
    <span id="status-text">GEREED</span>
  </div>

  <div id="messages">
    <div id="welcome">
      Welkom bij Hotel <span class="acc">Lumière</span>,<br>
      waarmee mag ik u helpen?
    </div>
  </div>

  <div id="quick-buttons">
    <button class="quick-btn purple" onclick="sendQuick('Ik wil graag een kamer reserveren.')">Reservering</button>
    <button class="quick-btn cyan"   onclick="sendQuick('Wat zijn de faciliteiten van het hotel?')">Faciliteiten</button>
    <button class="quick-btn cyan"   onclick="sendQuick('Hoe laat is het ontbijt?')">Ontbijt</button>
    <button class="quick-btn purple" onclick="sendQuick('Ik heb een verzoek voor de receptie.')">Verzoek</button>
  </div>

  <button id="keyboard-toggle" onclick="toggleTypeArea()">⌨ TYPEN</button>

  <div id="type-area">
    <textarea id="text-input" placeholder="Typ uw bericht..." rows="1"></textarea>
    <button id="send-btn" onclick="sendTyped()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div id="settings-overlay" class="hidden">
  <div id="settings-card">
    <div>
      <div class="settings-title">Instellingen</div>
      <div class="settings-sub" style="margin-top:6px;">Uw gegevens worden lokaal opgeslagen op dit apparaat.</div>
    </div>
    <div class="settings-field">
      <div class="settings-label">Anthropic API-sleutel</div>
      <div class="settings-input-wrap">
        <input id="api-key-input" type="password" placeholder="sk-ant-api03-..." autocomplete="off" spellcheck="false">
        <button onclick="toggleKeyVisibility()">👁</button>
      </div>
    </div>
    <div class="settings-field">
      <div class="settings-label">Proxy-URL <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#475569">(verplicht)</span></div>
      <div class="settings-input-wrap">
        <input id="proxy-url-input" type="url" placeholder="https://jouw-worker.workers.dev" autocomplete="off" spellcheck="false">
      </div>
    </div>
    <button id="save-key-btn" onclick="saveSettings()" disabled>Opslaan &amp; Doorgaan</button>
    <div class="settings-hint">console.anthropic.com</div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────
let history = [];
let isProcessing = false;
let isListening = false;
let recognition = null;
let cachedVoices = [];
let tick = 0;
let micActive = false;

const SYSTEM_PROMPT = `Je bent een vriendelijke, professionele receptionist van Hotel Lumière, een luxe hotelketen met vestigingen in Amsterdam, Rotterdam, Utrecht en Den Haag. Een gast spreekt met je. Stel gerichte vragen om de gast te helpen, zoals bij een echte hotelreceptie. Vraag naar gewenste vestiging, datum, aantal personen, kamertype, en speciale wensen. Bevestig reserveringen netjes. Antwoord altijd in het Nederlands. Houd antwoorden kort en natuurlijk, maximaal 3 zinnen.`;

// ── SETTINGS ───────────────────────────────────────────────────────────
const API_KEY_STORAGE   = 'lumiere_api_key';
const PROXY_URL_STORAGE = 'lumiere_proxy_url';
const DEFAULT_PROXY     = 'https://speakapphotel.basgeevers.workers.dev';

function getApiKey()   { return localStorage.getItem(API_KEY_STORAGE)   || ''; }
function getProxyUrl() { return localStorage.getItem(PROXY_URL_STORAGE) || ''; }
function getApiBase()  { return (getProxyUrl() || DEFAULT_PROXY).replace(/\/$/, ''); }

function openSettings() {
  document.getElementById('api-key-input').value   = getApiKey();
  document.getElementById('proxy-url-input').value = getProxyUrl();
  updateSaveBtn();
  document.getElementById('settings-overlay').classList.remove('hidden');
  setTimeout(() => document.getElementById('api-key-input').focus(), 50);
}
function closeSettings() {
  document.getElementById('settings-overlay').classList.add('hidden');
}
function saveSettings() {
  const key   = document.getElementById('api-key-input').value.trim();
  const proxy = document.getElementById('proxy-url-input').value.trim();
  if (!key.startsWith('sk-ant-')) return;
  localStorage.setItem(API_KEY_STORAGE, key);
  if (proxy) localStorage.setItem(PROXY_URL_STORAGE, proxy);
  else localStorage.removeItem(PROXY_URL_STORAGE);
  closeSettings();
}
function toggleKeyVisibility() {
  const input = document.getElementById('api-key-input');
  input.type = input.type === 'password' ? 'text' : 'password';
}
function updateSaveBtn() {
  document.getElementById('save-key-btn').disabled =
    !document.getElementById('api-key-input').value.trim().startsWith('sk-ant-');
}

// ── TTS ────────────────────────────────────────────────────────────────
if (window.speechSynthesis) {
  const load = () => {
    cachedVoices = speechSynthesis.getVoices();
    const nlVoices = cachedVoices.filter(v => v.lang.startsWith('nl'));
    if (nlVoices.length) {
      console.log(`[TTS] ${nlVoices.length} Nederlandse stem(men) gevonden:`);
      nlVoices.forEach((v, i) =>
        console.log(`  ${i + 1}. "${v.name}" | lang: ${v.lang} | lokaal: ${v.localService} | default: ${v.default}`)
      );
    } else {
      console.warn('[TTS] Geen Nederlandse stemmen gevonden. Alle beschikbare stemmen:', cachedVoices.map(v => v.name + ' (' + v.lang + ')'));
    }
  };
  speechSynthesis.onvoiceschanged = load;
  load();
}

function pickBestVoice(voices) {
  const nl = voices.filter(v => v.lang.startsWith('nl'));
  // Voorkeursvolgorde: nl-NL lokaal > nl-BE lokaal > nl-NL online > nl-BE online > elke nl
  return nl.find(v => v.lang === 'nl-NL' && v.localService)
      || nl.find(v => v.lang === 'nl-BE' && v.localService)
      || nl.find(v => v.lang === 'nl-NL')
      || nl.find(v => v.lang === 'nl-BE')
      || nl[0]
      || null;
}

function unlockAudio() {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance('');
  u.volume = 0;
  speechSynthesis.speak(u);
}

function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'nl-NL';
  utt.rate = 0.85;
  utt.pitch = 1.1;
  const voices = cachedVoices.length ? cachedVoices : speechSynthesis.getVoices();
  const best = pickBestVoice(voices);
  if (best) {
    utt.voice = best;
    console.log(`[TTS] Spreekt met stem: "${best.name}" (${best.lang}, lokaal: ${best.localService})`);
  } else {
    console.warn('[TTS] Geen Nederlandse stem beschikbaar, gebruik browser-standaard.');
  }
  utt.onstart = () => setStatus('speaking', 'SPREEKT');
  utt.onend = utt.onerror = () => setStatus('idle', 'GEREED');
  speechSynthesis.speak(utt);
}

// ── WAVE ANIMATION ─────────────────────────────────────────────────────
// Pre-create SVG bar elements for performance
const leftBars = [], rightBars = [];
const NS = 'http://www.w3.org/2000/svg';

function initWaveBars() {
  const wl = document.getElementById('wl');
  const wr = document.getElementById('wr');
  for (let i = 0; i < 28; i++) {
    const r = document.createElementNS(NS, 'rect');
    r.setAttribute('width', '2.5'); r.setAttribute('rx', '1.2');
    r.setAttribute('filter', 'url(#bf)');
    wl.appendChild(r); leftBars.push(r);
  }
  for (let i = 0; i < 28; i++) {
    const r = document.createElementNS(NS, 'rect');
    r.setAttribute('width', '2.5'); r.setAttribute('rx', '1.2');
    r.setAttribute('filter', 'url(#bf)');
    wr.appendChild(r); rightBars.push(r);
  }
}

function renderWave() {
  tick++;
  const a = micActive;
  const cy = 80;

  for (let i = 0; i < 28; i++) {
    const dist = Math.abs(i - 13.5) / 13.5;
    const bh = a
      ? 6 + 38 * (1 - dist * 0.5) * Math.abs(Math.sin(tick * 0.2 + i * 0.55))
      : 4 + 18 * (1 - dist * 0.6) * Math.abs(Math.sin(tick * 0.06 + i * 0.4));
    const h = Math.max(3, bh);
    const b = leftBars[i];
    b.setAttribute('x', 12 + i * 5.5);
    b.setAttribute('y', cy - h / 2);
    b.setAttribute('height', h);
    b.setAttribute('fill', a ? '#22d3ee' : '#67e8f9');
    b.setAttribute('opacity', 0.5 + (1 - dist) * 0.5);
  }

  for (let i = 0; i < 28; i++) {
    const dist = Math.abs(i - 13.5) / 13.5;
    const bh = a
      ? 6 + 38 * (1 - dist * 0.5) * Math.abs(Math.sin(tick * 0.22 + i * 0.6 + 1.2))
      : 4 + 18 * (1 - dist * 0.6) * Math.abs(Math.sin(tick * 0.07 + i * 0.45 + 1));
    const h = Math.max(3, bh);
    const b = rightBars[i];
    b.setAttribute('x', 148 + i * 3.8);
    b.setAttribute('y', cy - h / 2);
    b.setAttribute('height', h);
    b.setAttribute('fill', a ? '#a78bfa' : '#c4b5fd');
    b.setAttribute('opacity', 0.5 + (1 - dist) * 0.5);
  }

  // Rings
  const ro = document.getElementById('ro'), ri = document.getElementById('ri');
  if (a) {
    ro.setAttribute('r', 46 + 4 * Math.sin(tick * 0.2));
    ro.setAttribute('stroke', '#22d3ee'); ro.setAttribute('stroke-opacity', '0.6');
    ri.setAttribute('r', 56 + 5 * Math.sin(tick * 0.15));
    ri.setAttribute('stroke', '#06b6d4');
  } else {
    ro.setAttribute('r', '43'); ro.setAttribute('stroke', '#7c3aed'); ro.setAttribute('stroke-opacity', '0.3');
    ri.setAttribute('r', '52'); ri.setAttribute('stroke', '#7c3aed');
  }

  // Mic circle + icon color
  const mc = document.getElementById('mc');
  const col = a ? '#22d3ee' : '#c4b5fd';
  mc.setAttribute('fill', a ? '#071e2e' : '#100a2e');
  mc.setAttribute('stroke', a ? '#22d3ee' : '#7c3aed');
  ['mi0','mi1','mi2','mi3'].forEach(id => document.getElementById(id).setAttribute('stroke', col));

  // Gradient color
  document.getElementById('glow-stop').setAttribute('stop-color', a ? '#06b6d4' : '#7c3aed');

  requestAnimationFrame(renderWave);
}

// ── SPEECH RECOGNITION ─────────────────────────────────────────────────
function setupSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  recognition = new SR();
  recognition.lang = 'nl-NL';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => { isListening = true; micActive = true; setStatus('listening', 'LUISTEREN'); };
  recognition.onresult = e => {
    const t = e.results[0][0].transcript;
    if (t.trim()) sendMessage(t.trim());
  };
  recognition.onend = () => {
    isListening = false; micActive = false;
    if (!isProcessing) setStatus('idle', 'GEREED');
  };
  recognition.onerror = e => {
    isListening = false; micActive = false;
    if (e.error !== 'no-speech' && e.error !== 'aborted') setStatus('idle', 'GEREED');
  };
}

function toggleMic() {
  if (isProcessing) return;
  unlockAudio();
  if (!recognition) return;
  if (isListening) { recognition.stop(); }
  else { try { recognition.start(); } catch(e) {} }
}

// ── SEND MESSAGE ───────────────────────────────────────────────────────
async function sendMessage(text) {
  if (isProcessing) return;
  document.getElementById('welcome')?.remove();

  isProcessing = true;
  setStatus('thinking', 'VERWERKEN');

  history.push({ role: 'user', content: text });
  addMsg('user', text);
  const typingEl = addTyping();

  const apiKey = getApiKey();
  if (!apiKey) { openSettings(); isProcessing = false; typingEl.remove(); history.pop(); return; }

  try {
    const res = await fetch(getApiBase() + '/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 300,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await res.json();
    typingEl.remove();

    if (!res.ok) {
      addMsg('ai', `Fout: ${data?.error?.message || 'API fout ' + res.status}`);
      setStatus('idle', 'GEREED');
      history.pop(); isProcessing = false; return;
    }

    const reply = data.content?.[0]?.text || 'Geen antwoord ontvangen.';
    history.push({ role: 'assistant', content: reply });
    addMsg('ai', reply);
    speak(reply);

  } catch (err) {
    typingEl.remove();
    addMsg('ai', 'Verbindingsfout. Controleer uw instellingen via ⚙️.');
    setStatus('idle', 'GEREED');
    history.pop();
  }

  isProcessing = false;
}

function sendQuick(text) { unlockAudio(); sendMessage(text); }

// ── DOM HELPERS ────────────────────────────────────────────────────────
function addMsg(role, text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg-bubble ' + (role === 'user' ? 'user' : 'ai');
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}
function addTyping() {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'typing-dots';
  wrap.innerHTML = '<div></div><div></div><div></div>';
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return wrap;
}
function setStatus(state, text) {
  document.getElementById('status-text').textContent = text;
  const d = document.getElementById('status-dot');
  d.className = 'status-dot' + (state !== 'idle' ? ' ' + state : '');
}

// ── TEXT INPUT ─────────────────────────────────────────────────────────
function toggleTypeArea() {
  const area = document.getElementById('type-area');
  const show = !area.classList.contains('visible');
  area.classList.toggle('visible', show);
  if (show) document.getElementById('text-input').focus();
}
function sendTyped() {
  const ta = document.getElementById('text-input');
  const text = ta.value.trim();
  if (!text || isProcessing) return;
  unlockAudio();
  ta.value = ''; ta.style.height = 'auto';
  sendMessage(text);
}

// ── INIT ──────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('api-key-input').addEventListener('input', updateSaveBtn);
  document.getElementById('api-key-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveSettings();
    if (e.key === 'Escape' && getApiKey()) closeSettings();
  });
  const ta = document.getElementById('text-input');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
  });
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendTyped(); }
  });

  initWaveBars();
  renderWave();
  setupSpeechRecognition();
  if (!getApiKey()) openSettings();
});
</script>
